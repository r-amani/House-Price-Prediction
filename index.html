<!DOCTYPE html>

<html>

<head>
<title>House Price Predictor</title>
<link href="style.css" rel="stylesheet"/>
</head>

<body>

<div class="app">

<h1>🏠 House Price Predictor</h1>
<p class="subtitle">Enter housing features to estimate the price</p>

<div class="grid">

<input id="qual" placeholder="Overall Quality (1-10)">
<input id="area" placeholder="Living Area (sq ft)">

<input id="garagecars" placeholder="Garage Capacity">
<input id="garagearea" placeholder="Garage Area (sq ft)">

<input id="bsmt" placeholder="Total Basement Area (sq ft)">
<input id="firstflr" placeholder="1st Floor Area (sq ft)">

<input id="bath" placeholder="Full Bathrooms">
<input id="rooms" placeholder="Total Rooms Above Ground">

<input id="year" placeholder="Year Built">

<select id="lotshape">
<option value="0">Regular</option>
<option value="1">Slightly Irregular</option>
<option value="2">Moderately Irregular</option>
<option value="3">Irregular</option>
</select>

</div>

<button onclick="predict()">Predict Price</button>

<div class="loader" id="loader"></div>

<h2 id="result"></h2>

</div>

<script src="script.js"></script>

</body>

</html>
